name: Fare Monitor

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  check-fares:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit prices.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fare check
        env:
          AMADEUS_API_KEY:    ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ORIGIN_AIRPORT:     ${{ secrets.ORIGIN_AIRPORT }}
        run: python3 -c "from monitor import run_once; run_once()"

      - name: Save updated prices to repo
        run: |
          git config user.name "Fare Watcher Bot"
          git config user.email "action@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "update prices [skip ci]"
          git push
